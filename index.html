<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="PicoDeon Player is a browser-based keyboard instrument by Picokeebs with touch, MIDI input and adjustable key size.">
  <meta name="keywords" content="PicoDeon, virtual keyboard, MIDI keyboard, browser instrument, Picokeebs">
  <meta name="author" content="Picokeebs">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="theme-color" content="#121212">
  <meta name="application-name" content="PicoDeon Player">

  <link rel="canonical" href="https://player.picodeon.xyz/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PicoDeon Player">
  <meta property="og:title" content="PicoDeon Player">
  <meta property="og:description" content="Play PicoDeon in your browser with touch controls and MIDI support.">
  <meta property="og:url" content="https://player.picodeon.xyz/">
  <meta property="og:image" content="https://player.picodeon.xyz/icon.png">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PicoDeon Player">
  <meta name="twitter:description" content="Play PicoDeon in your browser with touch controls and MIDI support.">
  <meta name="twitter:image" content="https://player.picodeon.xyz/icon.png">

  <title>PicoDeon Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
  <div class="rotate-prompt">
    <div class="rotate-icon">&#x21BB;</div>
    <p>Rotate your device to landscape</p>
  </div>

  <div class="top-bar">
    <div class="control-group">
      <select id="soundSelect"></select>
      <div id="status" class="status"></div>
    </div>
    <div class="control-group">
      <select id="midiInput"><option value="">— MIDI Input —</option></select>
      <div id="midiStatus" class="status midi-status"></div>
    </div>
    <div class="control-group size-group">
      <div class="size-row">
        <label for="sizeSlider">Key Size</label>
        <input type="range" id="sizeSlider" min="50" max="150" value="100" step="10">
        <input type="text" id="sizeInput" class="size-input" value="100" maxlength="3">
        <button id="sizeReset" class="size-reset" title="Reset">&#x21BA;</button>
      </div>
    </div>
  </div>

  <div class="keyboard-stage">
    <section id="keyboard" class="keyboard"></section>
  </div>

  <footer class="footer">PicoDeon by <a href="https://picokeebs.fr" target="_blank" rel="noopener">Picokeebs</a></footer>

  <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
